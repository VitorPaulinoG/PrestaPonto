<app-auth-shell>
  <form class="auth-form" [formGroup]="form" (ngSubmit)="submit()">
    <app-select-field [control]="form.controls.role" [options]="roleOptions"/>
    
    <app-text-field
      [control]="form.controls.email"
      icon="alternate_email"
      type="email"
      autocomplete="email"
      placeholder="Insira seu email"
    />

    <app-text-field
      [control]="form.controls.password"
      icon="key_vertical"
      type="password"
      autocomplete="current-password"
      placeholder="Insira sua senha"
    />

    <button class="auth-form__link" type="button">Esqueceu Sua Senha?</button>
    <app-button class="">
      Login
    </app-button>
  </form>
</app-auth-shell>
