<section class="auth-shell">
  <aside class="auth-shell__panel">
    <app-brand-logo [inverted]="true" />
  </aside>

  <div class="auth-shell__content">
    <header class="auth-shell__header">
      <div class="auth-shell__logo">
        <app-brand-logo [compact]="true" />
      </div>

      <div class="auth-shell__welcome">
        <h1>Bem vindo ao PrestaPonto</h1>
        <p>Faça login ou cadastre-se para acessar nosso marketplace de serviços.</p>
      </div>
    </header>

    <app-tabs
      ariaLabel="Navegação de autenticação"
      [items]="[
        { label: 'Login', routerLink: '/login' },
        { label: 'Sign Up', routerLink: '/signup' }
      ]"
    />

    <main class="auth-shell__body">
      <ng-content />
    </main>
  </div>
</section>
