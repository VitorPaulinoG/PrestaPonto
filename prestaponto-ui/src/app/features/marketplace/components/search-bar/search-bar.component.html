<label class="search-bar">
  <span class="search-bar__icon" aria-hidden="true">
    <svg viewBox="0 0 24 24"><path d="m20 20-4.35-4.35M10.75 18a7.25 7.25 0 1 1 0-14.5 7.25 7.25 0 0 1 0 14.5Z" /></svg>
  </span>
  <input
    #input
    class="search-bar__input"
    type="search"
    [placeholder]="placeholder()"
    [value]="value()"
    (keydown)="onKeydown($event)"
  />
</label>
