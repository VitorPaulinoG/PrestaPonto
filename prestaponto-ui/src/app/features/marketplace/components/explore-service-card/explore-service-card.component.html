<article class="explore-service-card">
  <div class="explore-service-card__body">
    <div class="explore-service-card__header">
      <p class="explore-service-card__name">{{ serviceName() }}</p>
      <div class="explore-service-card__rating">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="m12 3 2.8 5.67 6.2.9-4.5 4.39 1.06 6.19L12 17.2l-5.56 2.95 1.06-6.19L3 9.57l6.2-.9z" />
        </svg>
        <span>{{ rating().toFixed(1) }}</span>
      </div>
    </div>
    <p class="explore-service-card__provider">{{ providerName() }} — {{ category() }}</p>
    <p class="explore-service-card__price">{{ price() }}</p>
  </div>
</article>
