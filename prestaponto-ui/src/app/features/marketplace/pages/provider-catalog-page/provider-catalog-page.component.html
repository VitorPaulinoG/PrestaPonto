<app-mobile-shell [navItems]="navItems" activeNav="catalog">
  <app-hero-header>
    <app-search-bar
      placeholder="Buscar os servicos do seu catalogo"
      (search)="onSearchChange($event)"
    />
  </app-hero-header>

  <main class="relative flex-1 flex flex-col overflow-y-auto px-[var(--spacing-md)] pt-[var(--spacing-md)] pb-[var(--spacing-lg)]">
    <section class="flex flex-col gap-[var(--spacing-sm)]">
      <h1 class="m-0 text-[var(--color-primary-01)] text-base font-semibold">Serviços</h1>

      @if (services().length > 0) {
        <div class="flex flex-col gap-[var(--spacing-sm)]">
          @for (service of services(); track service.id) {
            <app-service-list-item
              [title]="service.title"
              [category]="service.category"
              [price]="service.price"
            />
          }
        </div>
      } @else if (!loading()) {
        <p class="m-0 text-sm text-[var(--color-neutral-04)]">Nenhum serviço encontrado.</p>
      }
    </section>

    <a
      class="absolute right-[1.5rem] bottom-[1.625rem] inline-flex items-center justify-center w-12 h-12 rounded-[var(--radius-sm)] bg-[var(--color-white)] text-[var(--color-primary-03)]"
      routerLink="/provider/catalog/new"
      aria-label="Cadastrar serviço"
    >
      <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 5v14M5 12h14" />
      </svg>
    </a>
  </main>
</app-mobile-shell>
