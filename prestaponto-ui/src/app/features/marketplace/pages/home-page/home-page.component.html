<app-mobile-shell [navItems]="navItems" activeNav="home">
  <app-hero-header title="Qual serviço você precisa hoje?">
    <app-search-bar placeholder="Buscar Profissionais ou Serviços..." />
  </app-hero-header>
  
  <app-page-content>
    <app-section-block title="Categoria" linkText="Ver Todas">
      <div class="category-grid">
        @for (category of categories; track category.title) {
          <app-category-card [title]="category.title" [icon]="category.icon" />
        }
      </div>
    </app-section-block>

    <app-section-block
      title="Em Destaque"
      linkText="Ver Todos"
      maxHeight="30rem"
    >
      <div class="list-stack">
        @for (provider of providers; track provider.name + provider.category) {
          <app-provider-list-item
            [initials]="provider.initials"
            [name]="provider.name"
            [category]="provider.category"
            [rating]="provider.rating"
          />
        }
      </div>
    </app-section-block>
  </app-page-content>
</app-mobile-shell>
