<section
  class="flex flex-col gap-[var(--spacing-sm)] overflow-y-hidden"
  [style.max-height]="maxHeight()"
>
    <div class="flex items-center justify-between gap-[var(--spacing-sm)]">
    <h2 class="m-0 text-primary-01 text-base font-semibold">
        {{ title() }}
    </h2>
    @if (linkText()) {
        <a
        [href]="linkHref()"
        class="m-0 text-primary-02 text-xs no-underline"
        >
            {{ linkText() }}
        </a>
    }
    </div>
    <ng-content />
</section>
